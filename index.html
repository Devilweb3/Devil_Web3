<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralGen — AI Content Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --accent: #00e5b0;
    --accent2: #ff6b35;
    --text: #e6edf3;
    --muted: #7d8590;
    --danger: #f85149;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,229,176,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,17,23,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span {
    color: var(--text);
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn-ghost {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,176,0.05);
  }

  /* Tabs */
  .tabs {
    display: flex;
    padding: 16px 20px 0;
    gap: 4px;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 10px 18px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab:hover:not(.active) {
    color: var(--text);
  }

  /* Main content */
  .content {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Model toggle */
  .model-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
  }

  .model-btn {
    padding: 10px;
    border-radius: 7px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    background: none;
  }
  .model-btn.active {
    background: var(--accent);
    color: #000;
    box-shadow: 0 2px 8px rgba(0,229,176,0.3);
  }

  /* Input area */
  .input-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .input-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    transition: border-color 0.2s;
  }
  .input-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,176,0.1);
  }

  .input-box textarea {
    width: 100%;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    resize: none;
    line-height: 1.5;
    min-height: 80px;
  }
  .input-box textarea::placeholder { color: var(--muted); }

  /* Select */
  .select-wrapper {
    position: relative;
  }
  .select-wrapper::after {
    content: '⌄';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 16px;
  }

  select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 40px 13px 14px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus { border-color: var(--accent); }

  /* Bottom controls */
  .bottom-controls {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 10px;
  }

  .btn-generate {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .btn-generate:hover {
    background: #00ffca;
    box-shadow: 0 4px 20px rgba(0,229,176,0.4);
    transform: translateY(-1px);
  }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading shimmer on button */
  .btn-generate .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Output card */
  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeSlideIn 0.4s ease;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .output-tag {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .model-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(0,229,176,0.08);
    border: 1px solid rgba(0,229,176,0.2);
    padding: 3px 8px;
    border-radius: 20px;
  }

  .output-body {
    padding: 16px;
  }

  .output-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
  }

  .output-actions {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }

  .btn-action {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-action:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(0,229,176,0.05);
  }
  .btn-action.copied {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Reply generator tab */
  .reply-content {
    display: none;
  }
  .reply-content.visible {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Typing cursor */
  .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.7s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* Placeholder cards */
  .placeholder-card {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
  }
  .placeholder-card .icon { font-size: 32px; margin-bottom: 10px; }
  .placeholder-card p { font-size: 14px; line-height: 1.5; }

  /* History */
  .history-section {
    margin-top: 8px;
  }
  .history-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .clear-btn {
    font-size: 11px;
    color: var(--danger);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--accent);
    color: #000;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 30px;
    z-index: 1000;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="logo">Viral<span>Gen</span></div>
    <div class="header-actions">
      <button class="btn-ghost" onclick="toggleSettings()">⚙ Settings</button>
      <button class="btn-ghost" onclick="showToast('Logged out!')">Logout</button>
    </div>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab" id="tab-reply" onclick="switchTab('reply')">Reply Generator</button>
    <button class="tab active" id="tab-viral" onclick="switchTab('viral')">Viral Content</button>
  </div>

  <!-- VIRAL CONTENT TAB -->
  <div class="content" id="content-viral">
    <!-- Model Toggle -->
    <div class="model-toggle">
      <button class="model-btn active" id="model-claude" onclick="setModel('claude')">✦ Claude AI</button>
      <button class="model-btn" id="model-openrouter" onclick="setModel('openrouter')">OpenRouter</button>
    </div>

    <!-- Topic Input -->
    <div>
      <div class="input-label">Topik / Niche</div>
      <div class="input-box">
        <textarea id="topicInput" placeholder="Contoh: cara membuat postingan yang viral, tips jualan online, mindset sukses..." rows="3"></textarea>
      </div>
    </div>

    <!-- Framework -->
    <div>
      <div class="input-label">Framework Copywriting</div>
      <div class="select-wrapper">
        <select id="frameworkSelect">
          <option value="PAS">⚡ PAS — Problem, Agitate, Solution</option>
          <option value="AIDA">🎯 AIDA — Attention, Interest, Desire, Action</option>
          <option value="FAB">💎 FAB — Features, Advantages, Benefits</option>
          <option value="HOOK">🪝 Hook — Story — CTA</option>
          <option value="BAB">✨ BAB — Before, After, Bridge</option>
          <option value="4U">🔥 4U — Urgent, Unique, Useful, Ultra-specific</option>
        </select>
      </div>
    </div>

    <!-- Language + Generate -->
    <div class="bottom-controls">
      <div class="select-wrapper">
        <select id="langSelect">
          <option value="id">🇮🇩 Indonesia</option>
          <option value="en">🇺🇸 English</option>
          <option value="mixed">🔀 Campur</option>
        </select>
      </div>
      <button class="btn-generate" id="generateBtn" onclick="generateContent()">
        <span id="btnText">✦ Generate Content</span>
      </button>
    </div>

    <!-- Output -->
    <div id="outputArea">
      <div class="placeholder-card">
        <div class="icon">⚡</div>
        <p>Masukkan topik dan pilih framework,<br>lalu tekan <strong>Generate Content</strong></p>
      </div>
    </div>

    <!-- History -->
    <div class="history-section" id="historySection" style="display:none">
      <div class="history-label">
        Riwayat
        <button class="clear-btn" onclick="clearHistory()">Hapus semua</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- REPLY GENERATOR TAB -->
  <div class="content reply-content" id="content-reply">
    <!-- Model Toggle -->
    <div class="model-toggle">
      <button class="model-btn active">✦ Claude AI</button>
      <button class="model-btn">OpenRouter</button>
    </div>

    <div>
      <div class="input-label">Konten / Komentar yang ingin dibalas</div>
      <div class="input-box">
        <textarea id="replyInput" placeholder="Paste konten atau komentar di sini..." rows="4"></textarea>
      </div>
    </div>

    <div>
      <div class="input-label">Tone Balasan</div>
      <div class="select-wrapper">
        <select id="toneSelect">
          <option value="friendly">😊 Friendly & Warm</option>
          <option value="professional">💼 Professional</option>
          <option value="witty">😄 Witty & Humor</option>
          <option value="empathetic">🤝 Empatik</option>
          <option value="assertive">💪 Tegas & Percaya Diri</option>
        </select>
      </div>
    </div>

    <div class="bottom-controls">
      <div class="select-wrapper">
        <select>
          <option>🇮🇩 Indonesia</option>
          <option>🇺🇸 English</option>
        </select>
      </div>
      <button class="btn-generate" onclick="generateReply()">
        <span id="replyBtnText">↩ Generate Reply</span>
      </button>
    </div>

    <div id="replyOutputArea">
      <div class="placeholder-card">
        <div class="icon">↩</div>
        <p>Paste konten yang ingin dibalas,<br>lalu tekan <strong>Generate Reply</strong></p>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API_KEY = "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";
  let currentModel = 'claude';
  let history = [];
  let isGenerating = false;

  function switchTab(tab) {
    document.getElementById('tab-reply').classList.toggle('active', tab === 'reply');
    document.getElementById('tab-viral').classList.toggle('active', tab === 'viral');
    document.getElementById('content-viral').style.display = tab === 'viral' ? 'flex' : 'none';
    document.getElementById('content-reply').classList.toggle('visible', tab === 'reply');
  }

  function setModel(model) {
    currentModel = model;
    document.getElementById('model-claude').classList.toggle('active', model === 'claude');
    document.getElementById('model-openrouter').classList.toggle('active', model === 'openrouter');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function toggleSettings() {
    showToast('Settings coming soon!');
  }

  function clearHistory() {
    history = [];
    document.getElementById('historySection').style.display = 'none';
    document.getElementById('historyList').innerHTML = '';
  }

  function addToHistory(topic, framework, content) {
    history.unshift({ topic, framework, content, time: new Date() });
    if (history.length > 5) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    const section = document.getElementById('historySection');
    if (history.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = history.map((h, i) => `
      <div class="output-card" style="margin-bottom:10px; cursor:pointer" onclick="showHistoryItem(${i})">
        <div class="output-header">
          <span class="output-tag">${h.framework}</span>
          <span class="model-badge">${h.topic.substring(0,20)}${h.topic.length > 20 ? '...' : ''}</span>
        </div>
        <div class="output-body">
          <div class="output-text" style="max-height:60px; overflow:hidden; -webkit-line-clamp:3; display:-webkit-box; -webkit-box-orient:vertical;">${h.content}</div>
        </div>
      </div>
    `).join('');
  }

  function showHistoryItem(i) {
    renderOutputCard(history[i].content, history[i].framework);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderOutputCard(content, framework, isStreaming = false) {
    const outputArea = document.getElementById('outputArea');
    outputArea.innerHTML = `
      <div class="output-card">
        <div class="output-header">
          <span class="output-tag">Viral Content</span>
          <span class="model-badge">claude-sonnet-4</span>
        </div>
        <div class="output-body">
          <div class="output-text" id="outputText">${content}${isStreaming ? '<span class="typing-cursor"></span>' : ''}</div>
        </div>
        <div class="output-actions">
          <button class="btn-action" onclick="copyContent()">📋 Copy</button>
          <button class="btn-action" onclick="generateContent()">🔄 Regenerate</button>
          <button class="btn-action" onclick="shareContent()">↗ Share</button>
        </div>
      </div>
    `;
  }

  async function generateContent() {
    if (isGenerating) return;
    const topic = document.getElementById('topicInput').value.trim();
    if (!topic) { showToast('Masukkan topik terlebih dahulu!'); return; }

    const framework = document.getElementById('frameworkSelect').value;
    const lang = document.getElementById('langSelect').value;
    const btn = document.getElementById('generateBtn');
    const btnText = document.getElementById('btnText');

    isGenerating = true;
    btn.disabled = true;
    btnText.innerHTML = '<div class="spinner"></div> Generating...';

    // Show loading state
    document.getElementById('outputArea').innerHTML = `
      <div class="output-card">
        <div class="output-header">
          <span class="output-tag">Viral Content</span>
          <span class="model-badge">claude-sonnet-4</span>
        </div>
        <div class="output-body">
          <div class="output-text" id="outputText" style="color: var(--muted)">Memproses dengan AI...<span class="typing-cursor"></span></div>
        </div>
      </div>
    `;

    const langInstructions = {
      'id': 'Bahasa Indonesia gaul, natural, dan relatable',
      'en': 'English, casual and engaging',
      'mixed': 'Campur Bahasa Indonesia dan Inggris (code-switching) yang natural'
    };

    const frameworkDescriptions = {
      'PAS': 'Problem (identifikasi masalah painful), Agitate (perkuat rasa sakit/frustrasi), Solution (tawarkan solusi)',
      'AIDA': 'Attention (hook kuat), Interest (bangun ketertarikan), Desire (buat mereka mau), Action (CTA jelas)',
      'FAB': 'Features (fitur/fakta), Advantages (keunggulan), Benefits (manfaat nyata)',
      'HOOK': 'Hook yang kuat (3 detik pertama), Story yang relatable, CTA yang compelling',
      'BAB': 'Before (kondisi sebelum), After (kondisi impian), Bridge (cara mencapainya)',
      '4U': 'Urgent, Unique, Useful, Ultra-specific — semua 4 elemen dalam satu postingan'
    };

    const prompt = `Kamu adalah expert copywriter dan viral content strategist. Buat konten viral untuk media sosial (Twitter/X atau LinkedIn) tentang topik: "${topic}"

Framework: ${framework} — ${frameworkDescriptions[framework]}
Bahasa: ${langInstructions[lang]}

Panduan penting:
- Hook di kalimat pertama HARUS langsung memancing rasa penasaran atau pain point
- Gunakan bahasa yang ${lang === 'id' ? 'santai, gaul, relatable' : 'engaging and conversational'}
- Gunakan white space dan formatting yang mudah dibaca
- Panjang: 150-300 kata
- Akhiri dengan CTA atau pertanyaan yang mendorong engagement
- JANGAN gunakan hashtag terlalu banyak (max 3)
- Buat konten yang GENUINELY valuable, bukan clickbait kosong

Langsung tulis kontennya tanpa penjelasan tambahan.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": API_KEY, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const content = data.content?.[0]?.text || 'Gagal generate content. Coba lagi.';

      renderOutputCard(content, framework);
      addToHistory(topic, framework, content);
      showToast('✦ Content berhasil dibuat!');

    } catch (err) {
      document.getElementById('outputArea').innerHTML = `
        <div class="output-card">
          <div class="output-header">
            <span class="output-tag" style="color:var(--danger)">Error</span>
          </div>
          <div class="output-body">
            <div class="output-text" style="color:var(--danger)">Gagal terhubung ke AI. Periksa koneksi dan coba lagi.</div>
          </div>
        </div>
      `;
    } finally {
      isGenerating = false;
      btn.disabled = false;
      btnText.textContent = '✦ Generate Content';
    }
  }

  async function generateReply() {
    const input = document.getElementById('replyInput').value.trim();
    if (!input) { showToast('Masukkan konten yang ingin dibalas!'); return; }

    const tone = document.getElementById('toneSelect').value;
    const btn = document.querySelector('#content-reply .btn-generate');
    const btnText = document.getElementById('replyBtnText');

    btn.disabled = true;
    btnText.innerHTML = '<div class="spinner"></div> Generating...';

    document.getElementById('replyOutputArea').innerHTML = `
      <div class="output-card">
        <div class="output-header">
          <span class="output-tag">Reply</span>
          <span class="model-badge">claude-sonnet-4</span>
        </div>
        <div class="output-body">
          <div class="output-text" style="color:var(--muted)">Memproses...<span class="typing-cursor"></span></div>
        </div>
      </div>
    `;

    const toneGuide = {
      friendly: 'ramah, hangat, supportive',
      professional: 'profesional, berbobot, authoritative',
      witty: 'witty, humor ringan, entertaining',
      empathetic: 'empatik, pengertian, supportif',
      assertive: 'tegas, percaya diri, direct'
    };

    const prompt = `Buat balasan untuk konten/komentar berikut dengan tone ${toneGuide[tone]}:

"${input}"

Panduan:
- Tone: ${toneGuide[tone]}
- Bahasa Indonesia yang natural
- Singkat tapi impactful (2-4 kalimat)
- Tambahkan nilai atau insight baru
- Jangan terlalu formal atau kaku

Langsung tulis balasannya saja.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": API_KEY, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 500,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const content = data.content?.[0]?.text || 'Gagal generate reply.';

      document.getElementById('replyOutputArea').innerHTML = `
        <div class="output-card">
          <div class="output-header">
            <span class="output-tag">Reply Generator</span>
            <span class="model-badge">claude-sonnet-4</span>
          </div>
          <div class="output-body">
            <div class="output-text">${content}</div>
          </div>
          <div class="output-actions">
            <button class="btn-action" onclick="copyReply()">📋 Copy</button>
            <button class="btn-action" onclick="generateReply()">🔄 Ulang</button>
          </div>
        </div>
      `;
      showToast('✦ Reply berhasil dibuat!');
    } catch (err) {
      document.getElementById('replyOutputArea').innerHTML = `<div class="placeholder-card"><div class="icon">⚠</div><p>Gagal terhubung ke AI.</p></div>`;
    } finally {
      btn.disabled = false;
      btnText.textContent = '↩ Generate Reply';
    }
  }

  function copyContent() {
    const text = document.getElementById('outputText')?.innerText;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => showToast('📋 Copied to clipboard!'));
  }

  function copyReply() {
    const cards = document.querySelectorAll('#replyOutputArea .output-text');
    if (cards.length) navigator.clipboard.writeText(cards[0].innerText).then(() => showToast('📋 Copied!'));
  }

  function shareContent() {
    const text = document.getElementById('outputText')?.innerText;
    if (!text) return;
    if (navigator.share) {
      navigator.share({ text });
    } else {
      navigator.clipboard.writeText(text).then(() => showToast('📋 Copied for sharing!'));
    }
  }

  // Keyboard shortcut
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      const activeTab = document.getElementById('tab-viral').classList.contains('active') ? 'viral' : 'reply';
      if (activeTab === 'viral') generateContent();
      else generateReply();
    }
  });
</script>
</body>
</html>
